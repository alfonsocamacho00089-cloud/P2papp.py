name: Actualizar Tasas P2P

on:
  schedule:
    # Corre cada 15 min (Horario Vzla aproximado)
    - cron: '*/15 10-23,0-3 * * *'
    
  workflow_dispatch:
jobs:
  actualizar-p2p:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: pip install requests
      
      - name: Correr Script de Tasas
        run: python P2papp.py

      - name: Guardar cambios en el repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add p2p.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Tasas actualizadas (pyDolar + Yadio)" && git push)
