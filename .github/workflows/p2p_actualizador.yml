name: Actualizar Tasas Escalonadas

on:
  schedule:
    # Monto 3000: Corre cada 15 min desde 6:00 AM Vzla (10:00 UTC) hasta medianoche (04:00 UTC)
    - cron: '*/15 10-23 * * *'
    - cron: '*/15 0-3 * * *'

    # Monto 5000: Corre cada 15 min desde 6:15 AM Vzla (10:15 UTC)
    # Nota: Los crons de GitHub son fijos, para empezar 6:15 usamos esta lógica:
    - cron: '15,30,45 10 * * *' # Solo el bloque de las 6:15 AM a 6:45 AM
    - cron: '*/15 11-23 * * *' # De las 7 AM en adelante

    # Monto 10000: Desde 6:30 AM Vzla (10:30 UTC)
    - cron: '30,45 10 * * *'
    - cron: '*/15 11-23 * * *'

    # Monto 50000: Desde 6:45 AM Vzla (10:45 UTC)
    - cron: '45 10 * * *'
    - cron: '*/15 11-23 * * *'

    # Monto 100000: Desde 7:00 AM Vzla (11:00 UTC)
    - cron: '*/15 11-23 * * *'
    - cron: '*/15 0-3 * * *'

  workflow_dispatch: # Esto te permite darle al botón de "Play" manual desde el cel
jobs:
  actualizar-p2p:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          pip install requests pytz
      
      - name: Correr Script de Tasas
        run: python P2papp.py

      - name: Guardar cambios en el repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add p2p.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Tasas actualizadas (pyDolar + Yadio)" && git push)
